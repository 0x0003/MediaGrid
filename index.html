<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="light.css">
  <title>MediaGrid</title>
</head>

<body>

  <div id="top-trigger" aria-hidden="true"></div>

  <header id="header" aria-hidden="false">
    <button id="loadPanelToggle" type="button">
      <svg viewBox="0 0 20 20" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"
        stroke-linejoin="miter" style="vertical-align:middle;">
        <path d="M2 4 L4 4 L6 6 L18 6 L18 16 L2 16 Z" />
      </svg>
    </button>

    <div> <label> <b>|</b> </label> </div>

    <label>Columns:
      <select id="columns">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option selected>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
      </select>
    </label>

    <label>Media:
      <select id="filter">
        <option value="both" selected>Images & Videos</option>
        <option value="images">Images only</option>
        <option value="videos">Videos only</option>
      </select>
    </label>

    <label style="display:flex; align-items:center; gap:4px; color:var(--muted);">
      <input type="checkbox" id="shuffleToggle" checked />
      Shuffle
    </label>

    <div> <label> <b>|</b> </label> </div>

    <button id="reshuffleBtn" type="button" class="btn">Reshuffle</button>
    <button id="toggleAuto" type="button" class="btn">Resume</button>

    <label>Speed:
      <input id="speed" type="range" min="1" max="25" value="3" />
    </label>

    <label>Volume:
      <input id="volume" type="range" min="0" max="1" step="0.01" value="0.1" />
    </label>

    <div id="hotkeyIcon">?</div>
    <button id="themeToggle" type="button" aria-label="Toggle theme"></button>
  </header>

  <div id="loadPanel">
    <div id="loadPanelHeader">
      <span>Files</span>
      <button id="loadPanelClose" type="button">&times;</button>
    </div>
    <div id="loadPanelButtons">
      <input id="file" type="file" webkitdirectory multiple accept="image/*,video/*" />
      <button type="button" id="fileButton" class="btn">Select directories...</button>
      <button id="loadBtn" class="btn" disabled>Load</button>
    </div>
    <label id="loadPanelRegex">
      <input id="regexFilter" type="text" placeholder="Regex: * (Press Enter to apply)" />
    </label>
    <label id="loadPanelSubdirs">
      <input type="checkbox" id="ignoreSubdirs" checked />
      Only top-level
    </label>
    <div id="dirList"></div>
    <div id="mediaStatus"></div>
  </div>

  <div id="empty-prompt" aria-hidden="false">
    <div>
      <div style="font-weight:600; color:var(--text); margin-bottom:8px;">No media loaded</div>
      <div style="max-width:80ch;">
        Drag & drop directories onto this page to add them to the load queue.
      </div>
      <div style="max-width:80ch;">
        Press <b>z</b> to view keyboard shortcuts.
      </div>
    </div>
  </div>

  <div id="viewport" tabindex="0" aria-label="media viewport">
    <div id="container" role="list"></div>
  </div>

  <div id="dropOverlay">
    <div>
      <div>Drop directories here</div>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="./js/dom.js"></script>
  <script src="./js/grid.js"></script>
  <script src="./js/load.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/keymap.js"></script>

</body>

</html>
